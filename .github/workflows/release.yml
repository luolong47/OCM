name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            arch: x64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ] && [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -m1 '^version = ' backend/Cargo.toml | cut -d '"' -f2)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Enable Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ runner.os }}-${{ matrix.target }}
          cache-targets: true

      - name: Build backend
        working-directory: backend
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux .deb
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/bin
          cp "backend/target/${{ matrix.target }}/release/ocm-backend" pkg/usr/bin/
          cat > pkg/DEBIAN/control <<CONTROL
          Package: ocm
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Maintainer: OCM
          Description: OpenCode Config Manager
          CONTROL
          dpkg-deb --build pkg "ocm_${VERSION}_${{ matrix.arch }}.deb"

      - name: Package Windows .zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "backend/target/${{ matrix.target }}/release/ocm-backend.exe" -DestinationPath "ocm-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocm-${{ matrix.target }}
          path: |
            ocm_*.deb
            ocm-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find . -type f \( -name '*.deb' -o -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release-files/ \;
          ls -lh release-files/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
